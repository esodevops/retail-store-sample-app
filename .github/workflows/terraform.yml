name: Terraform

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: write

jobs:
  bootstrap-oidc:
    runs-on: ubuntu-latest
    outputs:
      aws_terraform_role_arn: ${{ steps.bootstrap-role.outputs.aws_terraform_role_arn || steps.resolve-role.outputs.aws_terraform_role_arn }}
    env:
      ROLE_NAME: project-bedrock-github-actions-terraform
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Existing Terraform Role ARN
        id: resolve-role
        env:
          ROLE_ARN_SECRET: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          ROLE_ARN_VARIABLE: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
        run: |
          is_real_value() {
            case "$1" in
              ""|placeholder|PLACEHOLDER|change-me|CHANGE_ME|changeme|your-role-arn|YOUR_ROLE_ARN)
                return 1
                ;;
              arn:aws:iam::*:role/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          if is_real_value "${ROLE_ARN_SECRET}"; then
            echo "aws_terraform_role_arn=${ROLE_ARN_SECRET}" >> "${GITHUB_OUTPUT}"
            echo "Using AWS_TERRAFORM_ROLE_ARN repository secret."
          elif is_real_value "${ROLE_ARN_VARIABLE}"; then
            echo "aws_terraform_role_arn=${ROLE_ARN_VARIABLE}" >> "${GITHUB_OUTPUT}"
            echo "Using AWS_TERRAFORM_ROLE_ARN repository variable."
          else
            echo "aws_terraform_role_arn=" >> "${GITHUB_OUTPUT}"
            echo "No existing OIDC role ARN found; bootstrap credentials are required only for first-time OIDC setup."
          fi
      - name: Bootstrap GitHub OIDC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_BOOTSTRAP_SESSION_TOKEN }}
          AWS_REGION: us-east-1
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXISTING_ROLE_ARN: ${{ steps.resolve-role.outputs.aws_terraform_role_arn }}
        run: |
          is_real_value() {
            case "$1" in
              ""|placeholder|PLACEHOLDER|change-me|CHANGE_ME|changeme|your-access-key|your-secret-key|YOUR_ACCESS_KEY|YOUR_SECRET_KEY)
                return 1
                ;;
              *)
                return 0
                ;;
            esac
          }

          if ! is_real_value "${AWS_ACCESS_KEY_ID}" || ! is_real_value "${AWS_SECRET_ACCESS_KEY}"; then
            if [ -n "${EXISTING_ROLE_ARN}" ]; then
              echo "Bootstrap AWS credentials not set; using existing AWS_TERRAFORM_ROLE_ARN."
              exit 0
            fi

            echo "::error::AWS_TERRAFORM_ROLE_ARN is not configured, and real bootstrap access key secrets are not available."
            echo "OIDC removes the need for long-lived AWS keys after the IAM OIDC provider and role already exist."
            echo "For the first run only, either:"
            echo "  1. Add a real AWS_TERRAFORM_ROLE_ARN repository secret/variable for an existing OIDC role, or"
            echo "  2. Add temporary AWS_BOOTSTRAP_ACCESS_KEY_ID/AWS_BOOTSTRAP_SECRET_ACCESS_KEY secrets to create that role."
            exit 1
          fi

          bash scripts/setup-github-oidc.sh
      - name: Export Bootstrapped Terraform Role ARN
        id: bootstrap-role
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_BOOTSTRAP_SESSION_TOKEN }}
          AWS_REGION: us-east-1
        run: |
          if ! aws sts get-caller-identity >/dev/null 2>&1; then
            echo "aws_terraform_role_arn=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/${ROLE_NAME}"
          echo "aws_terraform_role_arn=${ROLE_ARN}" >> "${GITHUB_OUTPUT}"
          echo "Resolved AWS_TERRAFORM_ROLE_ARN=${ROLE_ARN}"
      - name: Update GitHub Secret and Variable
        if: steps.bootstrap-role.outputs.aws_terraform_role_arn != ''
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          ROLE_ARN: ${{ steps.bootstrap-role.outputs.aws_terraform_role_arn }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_ADMIN_TOKEN not set; using resolved role ARN for this run only."
            echo "To persist it automatically, add a GH_ADMIN_TOKEN secret with permission to manage repository secrets and variables."
            exit 0
          fi

          printf '%s' "${ROLE_ARN}" | gh secret set AWS_TERRAFORM_ROLE_ARN --repo "${GITHUB_REPOSITORY}"
          gh variable set AWS_TERRAFORM_ROLE_ARN --body "${ROLE_ARN}" --repo "${GITHUB_REPOSITORY}"

  plan:
    needs: bootstrap-oidc
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
          unset-current-credentials: true
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
      - name: Ensure Terraform State Bucket Exists
        run: bash scripts/create-tfstate-bucket.sh
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure
      - name: Import Pre-existing Resources
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
        run: bash scripts/terraform-import-existing.sh
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color -out=tfplan | tee plan.txt
      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = `## Terraform Plan\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  apply:
    needs: bootstrap-oidc
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
          unset-current-credentials: true
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
      - name: Ensure Terraform State Bucket Exists
        run: bash scripts/create-tfstate-bucket.sh
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure
      - name: Import Pre-existing Resources
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
        run: bash scripts/terraform-import-existing.sh
      - name: Remove Pre-existing GitHub EKS Access Entry
        env:
          AWS_TERRAFORM_ROLE_ARN: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
          PRINCIPAL_ARN: ${{ needs.bootstrap-oidc.outputs.aws_terraform_role_arn || secrets.AWS_TERRAFORM_ROLE_ARN }}
          FORCE_DELETE: "true"
        run: bash scripts/cleanup-eks-access-entry.sh
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform Apply
        id: terraform-apply
        working-directory: terraform
        run: terraform apply -auto-approve
      - name: Verify EKS Cluster Exists
        if: success()
        run: |
          set -euo pipefail
          aws eks wait cluster-active --region us-east-1 --name project-bedrock-cluster
          aws eks describe-cluster --region us-east-1 --name project-bedrock-cluster >/dev/null
      - name: Setup Helm
        if: success()
        uses: azure/setup-helm@v4
      - name: Setup kubectl
        if: success()
        uses: azure/setup-kubectl@v4
      - name: Deploy Retail Store App
        if: success()
        run: bash helm/deploy-bedrock.sh
      - name: Generate Grading JSON
        run: bash scripts/generate-grading-json.sh
      - name: Commit Grading JSON
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add grading.json
          if git diff --cached --quiet; then
            echo "grading.json unchanged"
          else
            git commit -m "Update grading output [skip ci]"
            git push
          fi
