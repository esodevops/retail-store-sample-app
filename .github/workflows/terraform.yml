name: Terraform

on:
  workflow_dispatch:
  pull_request:
    paths: ["terraform/**"]
  push:
    branches: [main]
    paths: ["terraform/**"]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
      - name: Ensure Terraform State Bucket Exists
        run: bash scripts/create-tfstate-bucket.sh
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure
      - name: Import Pre-existing Resources
        run: bash scripts/terraform-import-existing.sh
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color -out=tfplan | tee plan.txt
      - name: Post Plan Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = `## Terraform Plan\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  apply:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
      - name: Ensure Terraform State Bucket Exists
        run: bash scripts/create-tfstate-bucket.sh
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -reconfigure
      - name: Import Pre-existing Resources
        run: bash scripts/terraform-import-existing.sh
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
