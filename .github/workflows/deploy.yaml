name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      version:
        description: 'Version to deploy (e.g., v1.0.0 or latest)'
        required: false
        default: 'latest'
  workflow_run:
    workflows: ["Publish Build"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GithubActionsEKSDeploy

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name project-bedrock-cluster

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Verify Terraform is installed
        run: |
          which terraform || echo "Terraform not found in PATH: $PATH"
          terraform version

      - name: Get Terraform outputs
        id: terraform-outputs
        run: |
          # Initialize terraform with backend
          cd terraform
          terraform init -backend-config="bucket=project-bedrock-tfstate-3765" -backend-config="key=state/terraform.tfstate" -backend-config="region=us-east-1" -reconfigure
          
          # Get outputs
          echo "carts_irsa_role_arn=$(terraform output -raw carts_irsa_role_arn)" >> $GITHUB_OUTPUT
          echo "catalog_mysql_endpoint=$(terraform output -raw catalog_mysql_endpoint)" >> $GITHUB_OUTPUT
          echo "orders_postgres_endpoint=$(terraform output -raw orders_postgres_endpoint)" >> $GITHUB_OUTPUT
          echo "dynamodb_table_name=$(terraform output -raw dynamodb_table_name)" >> $GITHUB_OUTPUT

      - name: Create namespace and apply RBAC
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/clusterrolebinding-dev-view.yaml
          kubectl apply -f k8s/aws-load-balancer-controller.yaml

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          # Use existing service account created by Terraform IRSA (eks-blueprints-addons)
          # Do NOT create a new service account as it won't have the IAM role annotation
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=project-bedrock-cluster \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=us-east-1 \
            --set vpcId=$(aws eks describe-cluster --name project-bedrock-cluster --region us-east-1 --query 'cluster.resourcesVpcConfig.vpcId' --output text) \
            --wait --timeout=180s
          
          echo "Waiting for AWS Load Balancer Controller to be ready..."
          kubectl wait --for=condition=available deployment/aws-load-balancer-controller -n kube-system --timeout=120s
          
          # Verify IRSA is working by checking service account annotations
          echo "Verifying IRSA configuration..."
          kubectl get serviceaccount aws-load-balancer-controller -n kube-system -o jsonpath='{.metadata.annotations}' || echo "Warning: ServiceAccount annotations not found"

      - name: Generate values file
        run: |
          cat > helm/values-bedrock.generated.yaml << EOF
          cart:
            serviceAccount:
              annotations:
                eks.amazonaws.com/role-arn: "${{ steps.terraform-outputs.outputs.carts_irsa_role_arn }}"
            app:
              persistence:
                dynamodb:
                  tableName: "${{ steps.terraform-outputs.outputs.dynamodb_table_name }}"
          
          catalog:
            app:
              persistence:
                mysql:
                  endpoint: "${{ steps.terraform-outputs.outputs.catalog_mysql_endpoint }}"
          
          orders:
            app:
              persistence:
                postgres:
                  endpoint: "${{ steps.terraform-outputs.outputs.orders_postgres_endpoint }}"
          EOF

      - name: Deploy Retail Store Helm chart
        id: deploy
        run: |
          # Build Helm dependencies
          helm dependency build src/app/chart
          
          # Deploy the application
          helm upgrade --install retail src/app/chart \
            --namespace retail-app \
            --create-namespace \
            -f src/app/chart/values.yaml \
            -f helm/values-bedrock.yaml \
            -f helm/values-bedrock.generated.yaml \
            --wait --timeout=600s
          
          # Apply ingress
          kubectl apply -f k8s/ingress.yaml
          
          # Wait for ingress to be available
          echo "Waiting for LoadBalancer to be provisioned..."
          
          # Set up a longer timeout and add debugging
          MAX_ATTEMPTS=60
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            INGRESS_STATUS=$(kubectl get ingress retail-ui-ingress -n retail-app -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$INGRESS_STATUS" ]; then
              echo "LoadBalancer provisioned successfully!"
              break
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Waiting for LoadBalancer..."
            
            # Show ingress events for debugging
            if [ $ATTEMPT -eq 10 ]; then
              echo "=== Ingress Events ==="
              kubectl describe ingress retail-ui-ingress -n retail-app || true
              echo "=== AWS Load Balancer Controller Logs ==="
              kubectl logs -l app.kubernetes.io/name=aws-load-balancer-controller -n kube-system --tail=50 || true
            fi
            
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          if [ -z "$INGRESS_STATUS" ]; then
            echo "=== Final Ingress Status ==="
            kubectl describe ingress retail-ui-ingress -n retail-app || true
            echo "=== AWS Load Balancer Controller Status ==="
            kubectl get pods -l app.kubernetes.io/name=aws-load-balancer-controller -n kube-system || true
            echo "ERROR: LoadBalancer provisioning timed out"
            exit 1
          fi
          
          echo "url=http://${INGRESS_STATUS}" >> $GITHUB_OUTPUT
          echo "Application deployed to: http://${INGRESS_STATUS}"

      - name: Verify deployment
        run: |
          echo "Checking pod status..."
          kubectl get pods -n retail-app
          
          echo "Checking ingress..."
          kubectl get ingress -n retail-app
          
          echo "Waiting for all pods to be ready..."
          kubectl wait --for=condition=ready pod --all -n retail-app --timeout=300s

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deploy.outputs.url }}" ]; then
            echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n retail-app >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY